# ModSecurity override — this file is mounted as a template and processed by the
# container's entrypoint. All audit log, engine mode, and body processing settings
# are already handled by the image via environment variables (MODSEC_RULE_ENGINE,
# MODSEC_AUDIT_LOG_FORMAT, MODSEC_AUDIT_LOG_TYPE, MODSEC_AUDIT_STORAGE_DIR, etc.).
# Only add directives here that the image does NOT expose as env vars.

# Custom rules from the dashboard API (rendered conf files mounted at runtime)
Include /etc/modsecurity.d/custom-rules/*.conf
